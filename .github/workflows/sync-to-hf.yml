name: Sync Backend to Hugging Face Spaces

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (con Git LFS resuelto)
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Anteponer metadata de Hugging Face Space al README (solo para este push, no se sube a GitHub)
        run: |
          cat > /tmp/hf_frontmatter.md << 'EOF'
          ---
          title: FISIAgent Backend
          emoji: 🧠
          colorFrom: red
          colorTo: gray
          sdk: docker
          app_port: 7860
          pinned: false
          ---

          EOF
          cat /tmp/hf_frontmatter.md README.md > /tmp/README_merged.md
          mv /tmp/README_merged.md README.md

      - name: Commit local (no se empuja a GitHub, solo se usa para el mirror a HF)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git commit -m "chore: metadata de Hugging Face Space (solo CI)"

      - name: Push al Space de Hugging Face
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ vars.HF_SPACE }}
        run: |
          git lfs fetch --all
          git remote add hf "https://user:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"
          git push --force hf HEAD:main
