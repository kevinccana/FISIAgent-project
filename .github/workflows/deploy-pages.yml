name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "FISIAgent-Front/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: FISIAgent-Front/package-lock.json

      - name: Install dependencies
        working-directory: FISIAgent-Front
        run: npm install

      - name: Build
        working-directory: FISIAgent-Front
        # VITE_API_URL: URL pública del backend (Hugging Face Space). Configúrala en
        # Settings → Secrets and variables → Actions → Variables como VITE_API_URL.
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: FISIAgent-Front/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
